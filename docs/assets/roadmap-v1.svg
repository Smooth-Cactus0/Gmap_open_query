<svg width="1600" height="980" viewBox="0 0 1600 980" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Prospecting Console V1 Roadmap</title>
  <desc id="desc">Visual roadmap showing what has been completed for V1, what should happen next, and what remains before public open-source release.</desc>
  <defs>
    <linearGradient id="bg" x1="120" y1="80" x2="1460" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="0.52" stop-color="#172554"/>
      <stop offset="1" stop-color="#0F766E"/>
    </linearGradient>
    <linearGradient id="cardDone" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FDE68A"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="cardNext" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#BFDBFE"/>
      <stop offset="1" stop-color="#0EA5E9"/>
    </linearGradient>
    <linearGradient id="cardLater" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#DDD6FE"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#020617" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="1600" height="980" rx="36" fill="#E2E8F0"/>
  <rect x="24" y="24" width="1552" height="932" rx="32" fill="url(#bg)"/>
  <circle cx="195" cy="174" r="190" fill="#F59E0B" fill-opacity="0.13"/>
  <circle cx="1412" cy="160" r="160" fill="#38BDF8" fill-opacity="0.12"/>
  <circle cx="1312" cy="844" r="210" fill="#34D399" fill-opacity="0.12"/>

  <text x="96" y="110" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="24" letter-spacing="6">GMAP OPEN QUERY</text>
  <text x="96" y="168" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="54" font-weight="700">V1 Delivery Roadmap</text>
  <text x="96" y="212" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="24">What is already built, what should happen next, and what remains before public release.</text>

  <rect x="1070" y="92" width="400" height="128" rx="28" fill="#FFFFFF" fill-opacity="0.1" stroke="#FFFFFF" stroke-opacity="0.16"/>
  <text x="1102" y="136" fill="#FCD34D" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="2">PROGRESS SNAPSHOT</text>
  <rect x="1102" y="154" width="336" height="22" rx="11" fill="#0F172A" fill-opacity="0.65"/>
  <rect x="1102" y="154" width="218" height="22" rx="11" fill="url(#cardDone)"/>
  <text x="1348" y="172" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">65%</text>
  <text x="1102" y="201" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="19">Foundation complete. Next work is validation, polish, and OSS release prep.</text>

  <g filter="url(#shadow)">
    <rect x="76" y="278" width="460" height="520" rx="34" fill="#FFF7ED"/>
    <rect x="76" y="278" width="460" height="92" rx="34" fill="url(#cardDone)"/>
    <text x="108" y="336" fill="#111827" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="800">Done</text>
    <text x="108" y="396" fill="#92400E" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="2">IMPLEMENTED IN THE REPO</text>

    <text x="108" y="446" fill="#111827" font-family="Segoe UI, Arial, sans-serif" font-size="24">• Next.js app shell and branded UI</text>
    <text x="108" y="486" fill="#111827" font-family="Segoe UI, Arial, sans-serif" font-size="24">• Prisma schema and Postgres adapter setup</text>
    <text x="108" y="526" fill="#111827" font-family="Segoe UI, Arial, sans-serif" font-size="24">• BullMQ worker with inline fallback mode</text>
    <text x="108" y="566" fill="#111827" font-family="Segoe UI, Arial, sans-serif" font-size="24">• Google Places Nearby + Text Search wiring</text>
    <text x="108" y="606" fill="#111827" font-family="Segoe UI, Arial, sans-serif" font-size="24">• Adaptive tiling and Place ID dedupe</text>
    <text x="108" y="646" fill="#111827" font-family="Segoe UI, Arial, sans-serif" font-size="24">• Projects, runs, TTL snapshots, and exports</text>
    <text x="108" y="686" fill="#111827" font-family="Segoe UI, Arial, sans-serif" font-size="24">• Map workspace, results table, and filters</text>
    <text x="108" y="726" fill="#111827" font-family="Segoe UI, Arial, sans-serif" font-size="24">• Docker, README, architecture, compliance docs</text>
    <text x="108" y="766" fill="#111827" font-family="Segoe UI, Arial, sans-serif" font-size="24">• Lint, tests, and production build passing</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="570" y="278" width="460" height="520" rx="34" fill="#EFF6FF"/>
    <rect x="570" y="278" width="460" height="92" rx="34" fill="url(#cardNext)"/>
    <text x="602" y="336" fill="#082F49" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="800">Next</text>
    <text x="602" y="396" fill="#075985" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="2">SHOULD HAPPEN BEFORE REAL USAGE</text>

    <text x="602" y="446" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="24">1. Add real Google Maps API keys locally</text>
    <text x="602" y="486" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="24">2. Start Postgres and Redis with Docker</text>
    <text x="602" y="526" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="24">3. Run the first live end-to-end searches</text>
    <text x="602" y="566" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="24">4. Check coverage in sparse and dense areas</text>
    <text x="602" y="606" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="24">5. Observe cost, quota, and API field behavior</text>
    <text x="602" y="646" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="24">6. Tighten error, loading, and empty states</text>
    <text x="602" y="686" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="24">7. Improve run monitoring and retry ergonomics</text>
    <text x="602" y="726" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="24">8. Capture screenshots for the public repo</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1064" y="278" width="460" height="520" rx="34" fill="#F5F3FF"/>
    <rect x="1064" y="278" width="460" height="92" rx="34" fill="url(#cardLater)"/>
    <text x="1096" y="336" fill="#312E81" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="800">Later</text>
    <text x="1096" y="396" fill="#5B21B6" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="2">POST-MVP / OPEN-SOURCE HARDENING</text>

    <text x="1096" y="446" fill="#111827" font-family="Segoe UI, Arial, sans-serif" font-size="24">• Cancellation, rerun, and scheduling flows</text>
    <text x="1096" y="486" fill="#111827" font-family="Segoe UI, Arial, sans-serif" font-size="24">• Better queue visibility and job analytics</text>
    <text x="1096" y="526" fill="#111827" font-family="Segoe UI, Arial, sans-serif" font-size="24">• More robust backoff and throttle controls</text>
    <text x="1096" y="566" fill="#111827" font-family="Segoe UI, Arial, sans-serif" font-size="24">• Richer table UX and larger-result pagination</text>
    <text x="1096" y="606" fill="#111827" font-family="Segoe UI, Arial, sans-serif" font-size="24">• Better onboarding and demo content</text>
    <text x="1096" y="646" fill="#111827" font-family="Segoe UI, Arial, sans-serif" font-size="24">• CONTRIBUTING guide and issue templates</text>
    <text x="1096" y="686" fill="#111827" font-family="Segoe UI, Arial, sans-serif" font-size="24">• Release notes and semantic versioning flow</text>
    <text x="1096" y="726" fill="#111827" font-family="Segoe UI, Arial, sans-serif" font-size="24">• Final policy/terms review before promotion</text>
  </g>

  <rect x="76" y="836" width="1448" height="86" rx="28" fill="#FFFFFF" fill-opacity="0.1" stroke="#FFFFFF" stroke-opacity="0.16"/>
  <text x="112" y="888" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="600">Launch path:</text>
  <text x="286" y="888" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="24">configure .env → start Docker services → run Prisma push → start app and worker → launch live searches</text>
</svg>
