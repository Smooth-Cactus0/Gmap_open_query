services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: google_prospecting
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  web:
    build: .
    command: npm run dev
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/google_prospecting?schema=public
      REDIS_URL: redis://redis:6379
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
      NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY:-}
      GOOGLE_MAPS_ATTRIBUTION_TEXT: ${GOOGLE_MAPS_ATTRIBUTION_TEXT:-Powered by Google Maps}
      RESULT_TTL_DAYS: ${RESULT_TTL_DAYS:-30}
      QUEUE_INLINE: "false"
      INTERNAL_JOB_SECRET: ${INTERNAL_JOB_SECRET:-change-me}
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules

  worker:
    build: .
    command: npm run worker
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/google_prospecting?schema=public
      REDIS_URL: redis://redis:6379
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
      RESULT_TTL_DAYS: ${RESULT_TTL_DAYS:-30}
      INTERNAL_JOB_SECRET: ${INTERNAL_JOB_SECRET:-change-me}
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  postgres_data:
  redis_data:
